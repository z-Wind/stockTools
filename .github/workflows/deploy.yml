name: Get Data and Deploy

on:
  schedule:
    # ------------------------------------------------------------------
    # 執行時間說明：
    # 目的：避開整點伺服器塞車，並完美收錄台股與美股（包含夏令盤後）的完整結算數據。
    # 填寫：30 0 * * 2-6 (UTC 時間週二至週六 00:30)
    # 實際：台北時間週二至週六 08:30 AM
    # ------------------------------------------------------------------
    - cron: "30 0 * * 2-6"
  workflow_dispatch:

env:
  PYTHON_VERSION: 3.12.4
  PYTHONUTF8: 1
  TZ: 'Asia/Taipei' # 設定環境變數時區

jobs:
  get-data:
    name: Get Data
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip' # 使用內建快取功能

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Index Data
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python get_extraData.py

      - name: Fetch Fund Data (Fund)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python get_extraData_fund.py

      - name: Fetch Taiwan Data
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python tw_analysis_data.py

      - name: Update Repository
        shell: bash
        run: |
          git config --global user.name 'z-Wind'
          git config --global user.email 'zpsyhapcst@gmail.com'
          git add .
          git diff --cached --exit-code || git commit -m "Regularly update extra Data"
          git push

  deploy:
    needs: get-data
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # --- Rust 編譯快取 ---
      - name: Cache Cargo & Maturin
        uses: actions/cache@v3
        with:
          path: |
            ./FFI/rust_pyo3/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and Install Rust Extension
        working-directory: ./FFI/rust_pyo3
        run: |
          maturin build --release
          python -m pip install ./target/wheels/rust_pyo3-*.whl

      - name: Generate Stock Report
        run: python stock.py

      - name: Run Taiwan Market Analysis
        run: python tw_analysis.py

      - name: Process Food Industry Data
        run: python tw_food.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
          publish_branch: gh-pages
